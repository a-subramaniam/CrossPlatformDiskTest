trigger: none

pool:
  vmImage: 'macOS-14'

steps:
  - bash: |
      curl -L -o "$TMPDIR/xamarin.mac.pkg" \
        "https://download.visualstudio.microsoft.com/download/pr/ceb0ea3f-4db8-46b4-8dc3-8049d27c0107/7b04843d469aae253519989fcb8e750f/xamarin.mac-9.3.0.23.pkg"
      sudo installer -pkg "$TMPDIR/xamarin.mac.pkg" -target /
    displayName: Install Xamarin.Mac SDK

  - bash: |
      echo "##vso[task.prependpath]/Library/Frameworks/Mono.framework/Versions/Current/Commands"
    displayName: Add Mono to PATH

  - bash: |
      TARGET="Saplin.CPDT.UICore/ViewModels/ResultsDbViewModel.cs"
      sed -i '' \
        's|public const string cpdt_web_url = @"https://maxim-saplin.github.io/cpdt_results/";|public const string cpdt_web_url = @""; // telemetry disabled|' \
        "$TARGET"
      grep -q 'cpdt_web_url = @""' "$TARGET" || { echo "Patch failed"; exit 1; }
    displayName: Apply telemetry patch

  - bash: msbuild CrossPlatformDiskTest.sln /t:Restore /verbosity:minimal
    displayName: Restore NuGet packages

  - bash: |
      msbuild Saplin.CPDT.Mac/Saplin.CPDT.Mac.csproj \
        /p:Configuration=Release /p:Platform=AnyCPU /verbosity:minimal
    displayName: Build Release

  - bash: |
      cd Saplin.CPDT.Mac/bin/Release
      zip -r "$(Build.ArtifactStagingDirectory)/CPDT-macOS.zip" CPDT.app
    displayName: Package .app

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/CPDT-macOS.zip'
      ArtifactName: CPDT-macOS
