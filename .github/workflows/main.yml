name: Build CPDT — macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Add Mono to PATH
        run: echo "/Library/Frameworks/Mono.framework/Versions/Current/Commands" >> $GITHUB_PATH
      - name: Apply telemetry patch
        run: |
          sed -i '' 's|public const string cpdt_web_url = @"https://maxim-saplin.github.io/cpdt_results/";|public const string cpdt_web_url = @"";|' Saplin.CPDT.UICore/ViewModels/ResultsDbViewModel.cs
      - name: Restore packages
        run: msbuild CrossPlatformDiskTest.sln /t:Restore /verbosity:minimal
      - name: Build
        run: msbuild Saplin.CPDT.Mac/Saplin.CPDT.Mac.csproj /p:Configuration=Release /p:Platform=AnyCPU /verbosity:minimal
      - name: List build output
        run: ls -la Saplin.CPDT.Mac/bin/Release/
      - name: Package
        run: cd Saplin.CPDT.Mac/bin/Release && zip -r "$GITHUB_WORKSPACE/CPDT-macOS.zip" CPDT.app
      - uses: actions/upload-artifact@v4
        with:
          name: CPDT-macOS
          path: CPDT-macOS.zip
