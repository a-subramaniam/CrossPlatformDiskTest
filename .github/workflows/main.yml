name: Build CPDT — Telemetry-Patched

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  build-macos:
    name: macOS — Xamarin.Mac
    runs-on: macos-13

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Add Mono to PATH
        run: echo "/Library/Frameworks/Mono.framework/Versions/Current/Commands" >> $GITHUB_PATH

      - name: Apply telemetry patch
        run: |
          TARGET="Saplin.CPDT.UICore/ViewModels/ResultsDbViewModel.cs"
          sed -i '' \
            's|public const string cpdt_web_url = @"https://maxim-saplin.github.io/cpdt_results/";|public const string cpdt_web_url = @""; // telemetry disabled|' \
            "$TARGET"
          grep -q 'cpdt_web_url = @""' "$TARGET" || { echo "::error::Patch failed"; exit 1; }
          echo "Patch applied:"; grep 'cpdt_web_url' "$TARGET"

      - name: Restore NuGet packages
        run: msbuild CrossPlatformDiskTest.sln /t:Restore /verbosity:minimal

      - name: Build Release
        run: |
          msbuild Saplin.CPDT.Mac/Saplin.CPDT.Mac.csproj \
            /p:Configuration=Release /p:Platform=AnyCPU /verbosity:minimal

      - name: Verify build output
        run: |
          ls -la Saplin.CPDT.Mac/bin/Release/
          test -d "Saplin.CPDT.Mac/bin/Release/CPDT.app" || { echo "::error::CPDT.app not found"; exit 1; }

      - name: Package .app as zip
        run: |
          cd Saplin.CPDT.Mac/bin/Release
          zip -r "$GITHUB_WORKSPACE/CPDT-macOS.zip" CPDT.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-macOS
          path: CPDT-macOS.zip
          retention-days: 30

  build-windows:
    name: Windows — .NET Framework 4.8
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Apply telemetry patch
        shell: pwsh
        run: |
          $target = "Saplin.CPDT.UICore\ViewModels\ResultsDbViewModel.cs"
          $content = Get-Content $target -Raw
          $patched = $content -replace `
            'public const string cpdt_web_url = @"https://maxim-saplin\.github\.io/cpdt_results/";', `
            'public const string cpdt_web_url = @""; // telemetry disabled'
          if ($patched -eq $content) { Write-Host "::error::Patch failed"; exit 1 }
          Set-Content -Path $target -Value $patched -Encoding UTF8
          Write-Host "Patch applied:"; Select-String 'cpdt_web_url' $target

      - name: Disable Costura
        shell: pwsh
        run: |
          $xml = '<?xml version="1.0" encoding="utf-8"?><Weavers xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="FodyWeavers.xsd"></Weavers>'
          Set-Content -Path "Saplin.CPDT.WPF\FodyWeavers.xml" -Value $xml -Encoding UTF8

      - name: Upgrade SkiaSharp core + Views to 2.88.8 (keep Views.Forms at 1.60.3)
        shell: pwsh
        run: |
          # packages.config: upgrade core + Views only; Forms stays at 1.60.3
          $f="Saplin.CPDT.WPF\packages.config"
          $c=(Get-Content $f -Raw)
          $c=$c -replace 'id="SkiaSharp" version="1\.60\.3"','id="SkiaSharp" version="2.88.8"'
          $c=$c -replace 'id="SkiaSharp\.Views" version="1\.60\.3"','id="SkiaSharp.Views" version="2.88.8"'
          # SkiaSharp.Views.Forms intentionally kept at 1.60.3 — 2.88.x triggers MC1000
          Set-Content $f $c; Write-Host "Patched packages.config:"; Get-Content $f | Select-String "SkiaSharp"

          # csproj HintPath folder names: upgrade core + Views only
          $f="Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj"
          $c=(Get-Content $f -Raw)
          $c=$c -replace 'SkiaSharp\.Views\.1\.60\.3','SkiaSharp.Views.2.88.8'  # Views (not Forms)
          $c=$c -replace 'SkiaSharp\.1\.60\.3','SkiaSharp.2.88.8'               # core only (no Views. prefix)
          # Assembly version: upgrade core + Views; leave Forms at 1.60.0.0
          $c=$c -replace 'SkiaSharp, Version=1\.60\.0\.0','SkiaSharp, Version=2.88.0.0'
          $c=$c -replace 'SkiaSharp\.Views\.Desktop, Version=1\.60\.0\.0','SkiaSharp.Views.Desktop, Version=2.88.0.0'
          $c=$c -replace 'SkiaSharp\.Views\.WPF, Version=1\.60\.0\.0','SkiaSharp.Views.WPF, Version=2.88.0.0'
          $c=$c -replace '<Error Condition="[^"]*SkiaSharp[^"]*"[^>]*/>', ''
          Set-Content $f $c; Write-Host "Patched Saplin.CPDT.WPF.csproj"

          # UICore PackageReference: upgrade core + Views; keep Forms at 1.60.3
          $f="Saplin.CPDT.UICore\Saplin.CPDT.UICore.csproj"
          $c=(Get-Content $f -Raw)
          $c=$c -replace '"SkiaSharp\.Views" Version="1\.60\.3"','"SkiaSharp.Views" Version="2.88.8"'
          $c=$c -replace '"SkiaSharp" Version="1\.60\.3"','"SkiaSharp" Version="2.88.8"'
          # SkiaSharp.Views.Forms PackageReference intentionally unchanged
          Set-Content $f $c; Write-Host "Patched Saplin.CPDT.UICore.csproj"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $slnDir = (Get-Location).Path + "\"
          msbuild Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj /t:Restore /p:RestorePackagesConfig=true "/p:SolutionDir=$slnDir" /verbosity:minimal

      - name: List SkiaSharp DLLs in packages (diagnostic)
        shell: pwsh
        run: |
          Write-Host "=== All SkiaSharp DLLs found after restore ==="
          Get-ChildItem "packages" -Recurse -Filter "SkiaSharp*.dll" |
            Select-Object -ExpandProperty FullName | Sort-Object

      - name: Fix SkiaSharp core+Views HintPaths dynamically
        shell: pwsh
        run: |
          $root = (Get-Location).Path
          $f = "Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj"
          $c = Get-Content $f -Raw

          # Only fix core and Views DLLs — leave SkiaSharp.Views.Forms.dll at 1.60.3 path.
          # Forms 2.88.x triggers MC1000 (has hidden Android dependency); 1.60.3 does not.
          $dlls = @("SkiaSharp.dll", "SkiaSharp.Views.Desktop.dll", "SkiaSharp.Views.WPF.dll")
          foreach ($dll in $dlls) {
            $found = Get-ChildItem "packages" -Recurse -Filter $dll |
              Where-Object {
                $p = $_.FullName
                $p -notmatch "\\ref\\" -and
                $p -notmatch "\\runtimes\\" -and
                $p -notmatch "\\MonoAndroid" -and
                $p -notmatch "\\Xamarin\." -and
                $p -notmatch "\\Tizen" -and
                $p -notmatch "\\monoandroid" -and
                $p -notmatch "\\net6" -and
                $p -notmatch "\\net7" -and
                $p -notmatch "\\net8"
              } |
              Sort-Object {
                $p = $_.FullName
                if     ($p -match "\\net45\\")            { 0 }
                elseif ($p -match "\\net461\\")           { 1 }
                elseif ($p -match "\\net4")               { 2 }
                elseif ($p -match "\\netstandard2\.0\\")  { 3 }
                elseif ($p -match "\\netstandard")        { 4 }
                else                                      { 5 }
              } |
              Select-Object -First 1

            if ($found) {
              $relPath = $found.FullName.Substring($root.Length + 1)
              $hintPath = "..\" + $relPath
              Write-Host "FOUND: $dll -> $hintPath"
              $c = $c -replace "\.\.\\packages\\[^<]*\\$([regex]::Escape($dll))", $hintPath
            } else {
              Write-Host "WARNING: $dll not found"
            }
          }
          Set-Content $f $c
          Write-Host "--- All HintPaths after update ---"
          Select-String "HintPath" $f | Select-Object -ExpandProperty Line

      - name: Add SkiaSharp binding redirect (Forms 1.60 -> core 2.88 at runtime)
        shell: pwsh
        run: |
          $configPath = "Saplin.CPDT.WPF\App.config"
          $redirect = @'
  <runtime>
    <assemblyBinding xmlns="urn:schemas-microsoft-com:asm.v1">
      <dependentAssembly>
        <assemblyIdentity name="SkiaSharp" publicKeyToken="0738eb9f132ed756" culture="neutral" />
        <bindingRedirect oldVersion="0.0.0.0-2.88.0.0" newVersion="2.88.0.0" />
      </dependentAssembly>
    </assemblyBinding>
  </runtime>
'@
          if (Test-Path $configPath) {
            $content = Get-Content $configPath -Raw
            if ($content -notmatch '<runtime>') {
              $content = $content -replace '</configuration>', "$redirect</configuration>"
              Set-Content $configPath $content
              Write-Host "Binding redirect added to existing App.config"
            } else {
              Write-Host "App.config already has <runtime> block, skipping"
            }
          } else {
            $content = "<?xml version='1.0' encoding='utf-8'?>`r`n<configuration>$redirect</configuration>"
            Set-Content $configPath $content
            Write-Host "Created new App.config with binding redirect"
          }
          Get-Content $configPath

      - name: Build Release
        shell: pwsh
        run: |
          $slnDir = (Get-Location).Path + "\"
          msbuild Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj "/p:SolutionDir=$slnDir" /p:Configuration=Release /p:Platform=AnyCPU /p:Prefer32Bit=false /verbosity:minimal

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "Saplin.CPDT.WPF\bin\Release\CPDT.exe"
          if (-not (Test-Path $exe)) { Write-Host "::error::CPDT.exe not found"; exit 1 }
          Write-Host "CPDT.exe found"
          Write-Host "DLL count: $((Get-ChildItem 'Saplin.CPDT.WPF\bin\Release' -Filter '*.dll').Count)"

      - name: Package Release folder as ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "Saplin.CPDT.WPF\bin\Release\*" -DestinationPath "CPDT-Windows.zip" -Force
          Write-Host "CPDT-Windows.zip created"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-Windows
          path: CPDT-Windows.zip
          retention-days: 30
