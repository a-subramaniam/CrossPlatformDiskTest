name: Build CPDT — Windows Test

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Build
        shell: pwsh
        run: |
          $slnDir = (Get-Location).Path + "\"
          msbuild Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj /restore /p:RestorePackagesConfig=true "/p:SolutionDir=$slnDir" /p:Configuration=Release /p:Platform=AnyCPU /p:Prefer32Bit=false /verbosity:minimal
      - name: List build output
        shell: pwsh
        run: Get-ChildItem Saplin.CPDT.WPF\bin\Release\ | Select-Object Name, Length
      - uses: actions/upload-artifact@v4
        with:
          name: CPDT-Windows-Original
          path: Saplin.CPDT.WPF\bin\Release\
