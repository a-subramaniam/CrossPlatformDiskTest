name: Build CPDT — Telemetry-Patched

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  build-macos:
    name: macOS — Xamarin.Mac
    runs-on: macos-13

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Add Mono to PATH
        run: echo "/Library/Frameworks/Mono.framework/Versions/Current/Commands" >> $GITHUB_PATH

      - name: Apply telemetry patch
        run: |
          TARGET="Saplin.CPDT.UICore/ViewModels/ResultsDbViewModel.cs"
          sed -i '' \
            's|public const string cpdt_web_url = @"https://maxim-saplin.github.io/cpdt_results/";|public const string cpdt_web_url = @""; // telemetry disabled|' \
            "$TARGET"
          grep -q 'cpdt_web_url = @""' "$TARGET" || { echo "::error::Patch failed"; exit 1; }
          echo "Patch applied:"
          grep 'cpdt_web_url' "$TARGET"

      - name: Restore NuGet packages
        run: msbuild CrossPlatformDiskTest.sln /t:Restore /verbosity:minimal

      - name: Build Release
        run: |
          msbuild Saplin.CPDT.Mac/Saplin.CPDT.Mac.csproj \
            /p:Configuration=Release \
            /p:Platform=AnyCPU \
            /verbosity:minimal

      - name: Verify build output
        run: |
          ls -la Saplin.CPDT.Mac/bin/Release/
          test -d "Saplin.CPDT.Mac/bin/Release/CPDT.app" || { echo "::error::CPDT.app not found"; exit 1; }

      - name: Package .app as zip
        run: |
          cd Saplin.CPDT.Mac/bin/Release
          zip -r "$GITHUB_WORKSPACE/CPDT-macOS.zip" CPDT.app
          echo "Archive size: $(du -sh $GITHUB_WORKSPACE/CPDT-macOS.zip | cut -f1)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-macOS
          path: CPDT-macOS.zip
          retention-days: 30

  build-windows:
    name: Windows — .NET Framework 4.8
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Apply telemetry patch
        shell: pwsh
        run: |
          $target = "Saplin.CPDT.UICore\ViewModels\ResultsDbViewModel.cs"
          $content = Get-Content $target -Raw
          $patched = $content -replace `
            'public const string cpdt_web_url = @"https://maxim-saplin\.github\.io/cpdt_results/";', `
            'public const string cpdt_web_url = @""; // telemetry disabled'
          if ($patched -eq $content) { Write-Host "::error::Patch failed"; exit 1 }
          Set-Content -Path $target -Value $patched -Encoding UTF8
          Write-Host "Patch applied:"; Select-String 'cpdt_web_url' $target

      - name: Disable Costura
        shell: pwsh
        run: |
          $xml = '<?xml version="1.0" encoding="utf-8"?><Weavers xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="FodyWeavers.xsd"></Weavers>'
          Set-Content -Path "Saplin.CPDT.WPF\FodyWeavers.xml" -Value $xml -Encoding UTF8
          Write-Host "Costura disabled"

      - name: Upgrade core SkiaSharp to 2.88.8 (Views stays at 1.60.3)
        shell: pwsh
        run: |
          # packages.config: only upgrade core SkiaSharp, leave Views at 1.60.3
          $f="Saplin.CPDT.WPF\packages.config"
          $c=(Get-Content $f -Raw) -replace 'id="SkiaSharp" version="1\.60\.3"','id="SkiaSharp" version="2.88.8"'
          Set-Content $f $c; Write-Host "Patched $f"

          # csproj: update version + path for core SkiaSharp.dll only
          $f="Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj"
          $c=(Get-Content $f -Raw)
          $c=$c -replace 'SkiaSharp\.1\.60\.3\\lib\\net45\\SkiaSharp\.dll','SkiaSharp.2.88.8\lib\netstandard2.0\SkiaSharp.dll'
          $c=$c -replace 'SkiaSharp\.1\.60\.3"','SkiaSharp.2.88.8"'
          $c=$c -replace 'SkiaSharp, Version=1\.60\.0\.0','SkiaSharp, Version=2.88.0.0'
          $c=$c -replace '<Error Condition="[^"]*SkiaSharp[^"]*"[^>]*/>', ''
          Set-Content $f $c; Write-Host "Patched $f"

          # UICore PackageReference: upgrade core SkiaSharp only
          $f="Saplin.CPDT.UICore\Saplin.CPDT.UICore.csproj"
          $c=(Get-Content $f -Raw) -replace '"SkiaSharp" Version="1\.60\.3"','"SkiaSharp" Version="2.88.8"'
          Set-Content $f $c; Write-Host "Patched $f"

          Write-Host "Core SkiaSharp -> 2.88.8, Views stays at 1.60.3"

      - name: Add SkiaSharp binding redirect to App.config
        shell: pwsh
        run: |
          $configPath = "Saplin.CPDT.WPF\App.config"
          $redirect = '<runtime><assemblyBinding xmlns="urn:schemas-microsoft-com:asm.v1"><dependentAssembly><assemblyIdentity name="SkiaSharp" publicKeyToken="0738eb9f132ed756" culture="neutral" /><bindingRedirect oldVersion="0.0.0.0-2.88.0.0" newVersion="2.88.0.0" /></dependentAssembly></assemblyBinding></runtime>'
          if (Test-Path $configPath) {
            $content = Get-Content $configPath -Raw
            if ($content -notmatch '<runtime>') {
              $content = $content -replace '</configuration>', "$redirect</configuration>"
              Set-Content $configPath $content
            }
          } else {
            Set-Content $configPath "<?xml version='1.0' encoding='utf-8'?><configuration>$redirect</configuration>"
          }
          Write-Host "Binding redirect added"; Get-Content $configPath

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        shell: pwsh
        run: |
          $slnDir = (Get-Location).Path + "\"
          msbuild Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj /restore /p:RestorePackagesConfig=true "/p:SolutionDir=$slnDir" /p:Configuration=Release /p:Platform=AnyCPU /p:Prefer32Bit=false /verbosity:minimal

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "Saplin.CPDT.WPF\bin\Release\CPDT.exe"
          if (-not (Test-Path $exe)) { Write-Host "::error::CPDT.exe not found"; exit 1 }
          Write-Host "CPDT.exe found"
          Write-Host "DLL count: $((Get-ChildItem 'Saplin.CPDT.WPF\bin\Release' -Filter '*.dll').Count)"

      - name: Package Release folder as ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "Saplin.CPDT.WPF\bin\Release\*" -DestinationPath "CPDT-Windows.zip" -Force
          Write-Host "CPDT-Windows.zip created"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-Windows
          path: CPDT-Windows.zip
          retention-days: 30
