name: Build CPDT — Telemetry-Patched

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  build-macos:
    name: macOS — Xamarin.Mac
    runs-on: macos-13

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Add Mono to PATH
        run: echo "/Library/Frameworks/Mono.framework/Versions/Current/Commands" >> $GITHUB_PATH

      - name: Apply telemetry patch
        run: |
          TARGET="Saplin.CPDT.UICore/ViewModels/ResultsDbViewModel.cs"
          sed -i '' \
            's|public const string cpdt_web_url = @"https://maxim-saplin.github.io/cpdt_results/";|public const string cpdt_web_url = @""; // telemetry disabled|' \
            "$TARGET"
          grep -q 'cpdt_web_url = @""' "$TARGET" || { echo "::error::Patch failed"; exit 1; }
          echo "Patch applied:"; grep 'cpdt_web_url' "$TARGET"

      - name: Restore NuGet packages
        run: msbuild CrossPlatformDiskTest.sln /t:Restore /verbosity:minimal

      - name: Build Release
        run: |
          msbuild Saplin.CPDT.Mac/Saplin.CPDT.Mac.csproj \
            /p:Configuration=Release /p:Platform=AnyCPU /verbosity:minimal

      - name: Verify build output
        run: |
          ls -la Saplin.CPDT.Mac/bin/Release/
          test -d "Saplin.CPDT.Mac/bin/Release/CPDT.app" || { echo "::error::CPDT.app not found"; exit 1; }

      - name: Package .app as zip
        run: |
          cd Saplin.CPDT.Mac/bin/Release
          zip -r "$GITHUB_WORKSPACE/CPDT-macOS.zip" CPDT.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-macOS
          path: CPDT-macOS.zip
          retention-days: 30

  build-windows:
    name: Windows — .NET Framework 4.8
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Apply telemetry patch
        shell: pwsh
        run: |
          $target = "Saplin.CPDT.UICore\ViewModels\ResultsDbViewModel.cs"
          $content = Get-Content $target -Raw
          $patched = $content -replace `
            'public const string cpdt_web_url = @"https://maxim-saplin\.github\.io/cpdt_results/";', `
            'public const string cpdt_web_url = @""; // telemetry disabled'
          if ($patched -eq $content) { Write-Host "::error::Patch failed"; exit 1 }
          Set-Content -Path $target -Value $patched -Encoding UTF8
          Write-Host "Patch applied:"; Select-String 'cpdt_web_url' $target

      - name: Disable Costura
        shell: pwsh
        run: |
          $xml = '<?xml version="1.0" encoding="utf-8"?><Weavers xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="FodyWeavers.xsd"></Weavers>'
          Set-Content -Path "Saplin.CPDT.WPF\FodyWeavers.xml" -Value $xml -Encoding UTF8

      - name: Remove CPDT.Extra.dll reference
        shell: pwsh
        run: |
          foreach ($proj in @("Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj","Saplin.CPDT.UICore\Saplin.CPDT.UICore.csproj")) {
            if (-not (Test-Path $proj)) { continue }
            $c = Get-Content $proj -Raw
            $before = $c.Length
            $c = [regex]::Replace($c, '\s*<Reference Include="CPDT\.Extra[^"]*">[\s\S]*?</Reference>', '')
            $c = $c -replace '\s*<Reference Include="CPDT\.Extra[^"]*"\s*/>', ''
            if ($c.Length -ne $before) {
              Set-Content $proj $c
              Write-Host "Removed CPDT.Extra reference from $proj"
            } else {
              Write-Host "No CPDT.Extra reference found in $proj"
            }
          }

      - name: Stub CPDT.Extra types in UICore
        shell: pwsh
        run: |
          $cb64 = ''
          [System.IO.File]::WriteAllBytes("Saplin.CPDT.UICore\Controls\CpdtExtraStubs.cs", [Convert]::FromBase64String($cb64))
          $rb64 = 'bmFtZXNwYWNlIFNhcGxpbi5DUERULlVJQ29yZQp7CiAgICBwdWJsaWMgaW50ZXJmYWNlIElTaGFyZUZpbGVzIHsgdm9pZCBTaGFyZShzdHJpbmdbXSBmaWxlcywgc3RyaW5nIG1pbWVUeXBlLCBzdHJpbmcgdGl0bGUpOyB9Cn0K'
          [System.IO.File]::WriteAllBytes("Saplin.CPDT.UICore\CpdtExtraRootStubs.cs", [Convert]::FromBase64String($rb64))
          Write-Host "Created CpdtExtraStubs.cs and CpdtExtraRootStubs.cs"

      - name: Fix XAML namespace — remove assembly=CPDT.Extra
        shell: pwsh
        run: |
          Get-ChildItem "Saplin.CPDT.UICore" -Recurse -Filter "*.xaml" | ForEach-Object {
            $c = Get-Content $_.FullName -Raw
            if ($c -match 'CPDT\.Extra') {
              $c = $c -replace 'clr-namespace:Saplin\.CPDT\.UICore\.Controls;assembly=CPDT\.Extra', 'clr-namespace:Saplin.CPDT.UICore.Controls'
              Set-Content $_.FullName $c -Encoding UTF8
              Write-Host "Fixed: $($_.Name)"
            }
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $slnDir = (Get-Location).Path + "\"
          msbuild Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj /t:Restore /p:RestorePackagesConfig=true "/p:SolutionDir=$slnDir" /verbosity:minimal

      - name: Build Release
        shell: pwsh
        run: |
          $slnDir = (Get-Location).Path + "\"
          msbuild Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj "/p:SolutionDir=$slnDir" /p:Configuration=Release /p:Platform=AnyCPU /p:Prefer32Bit=false /verbosity:minimal

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "Saplin.CPDT.WPF\bin\Release\CPDT.exe"
          if (-not (Test-Path $exe)) { Write-Host "::error::CPDT.exe not found"; exit 1 }
          Write-Host "CPDT.exe found"
          Write-Host "DLL count: $((Get-ChildItem 'Saplin.CPDT.WPF\bin\Release' -Filter '*.dll').Count)"

      - name: Package Release folder as ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "Saplin.CPDT.WPF\bin\Release\*" -DestinationPath "CPDT-Windows.zip" -Force
          Write-Host "CPDT-Windows.zip created"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-Windows
          path: CPDT-Windows.zip
          retention-days: 30
