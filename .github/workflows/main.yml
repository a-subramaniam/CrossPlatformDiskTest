name: Build CPDT — Telemetry-Patched

# Run manually from the Actions tab whenever you need a fresh build
on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  # ── macOS build ────────────────────────────────────────────────────────────
  build-macos:
    name: macOS — Xamarin.Mac
    runs-on: macos-13        # macos-14 dropped Xamarin; stay on 13

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Add Mono to PATH
        run: echo "/Library/Frameworks/Mono.framework/Versions/Current/Commands" >> $GITHUB_PATH

      - name: Apply telemetry patch
        run: |
          TARGET="Saplin.CPDT.UICore/ViewModels/ResultsDbViewModel.cs"
          sed -i '' \
            's|public const string cpdt_web_url = @"https://maxim-saplin.github.io/cpdt_results/";|public const string cpdt_web_url = @""; // telemetry disabled|' \
            "$TARGET"
          grep -q 'cpdt_web_url = @""' "$TARGET" || { echo "::error::Patch failed"; exit 1; }
          echo "Patch applied:"
          grep 'cpdt_web_url' "$TARGET"

      - name: Restore NuGet packages
        run: msbuild CrossPlatformDiskTest.sln /t:Restore /verbosity:minimal

      - name: Build Release
        run: |
          msbuild Saplin.CPDT.Mac/Saplin.CPDT.Mac.csproj \
            /p:Configuration=Release \
            /p:Platform=AnyCPU \
            /verbosity:minimal

      - name: Verify build output
        run: |
          ls -la Saplin.CPDT.Mac/bin/Release/
          test -d "Saplin.CPDT.Mac/bin/Release/CPDT.app" || { echo "::error::CPDT.app not found"; exit 1; }

      - name: Package .app as zip
        run: |
          cd Saplin.CPDT.Mac/bin/Release
          zip -r "$GITHUB_WORKSPACE/CPDT-macOS.zip" CPDT.app
          echo "Archive size: $(du -sh $GITHUB_WORKSPACE/CPDT-macOS.zip | cut -f1)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-macOS
          path: CPDT-macOS.zip
          retention-days: 30

  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows — .NET Framework 4.8
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Apply telemetry patch
        shell: pwsh
        run: |
          $target = "Saplin.CPDT.UICore\ViewModels\ResultsDbViewModel.cs"
          $content = Get-Content $target -Raw
          $patched = $content -replace `
            'public const string cpdt_web_url = @"https://maxim-saplin\.github\.io/cpdt_results/";', `
            'public const string cpdt_web_url = @""; // telemetry disabled'
          if ($patched -eq $content) {
            Write-Host "::error::Patch failed — URL not found in source"
            exit 1
          }
          Set-Content -Path $target -Value $patched -Encoding UTF8
          Write-Host "Patch applied:"
          Select-String 'cpdt_web_url' $target

      - name: Disable Costura (ship loose DLLs for compatibility)
        shell: pwsh
        run: |
          $xml = '<?xml version="1.0" encoding="utf-8"?><Weavers xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="FodyWeavers.xsd"></Weavers>'
          Set-Content -Path "Saplin.CPDT.WPF\FodyWeavers.xml" -Value $xml -Encoding UTF8
          Write-Host "Costura disabled — DLLs will be loose in output folder"
          Get-Content "Saplin.CPDT.WPF\FodyWeavers.xml"

      - name: Upgrade SkiaSharp to 2.88.8 (fixes MissingMethodException)
        shell: pwsh
        run: |
          $f="Saplin.CPDT.WPF\packages.config"; $c=(Get-Content $f -Raw) -replace 'id="SkiaSharp" version="1\.60\.3"','id="SkiaSharp" version="2.88.8"' -replace 'id="SkiaSharp\.Views" version="1\.60\.3"','id="SkiaSharp.Views" version="2.88.8"' -replace 'id="SkiaSharp\.Views\.Forms" version="1\.60\.3"','id="SkiaSharp.Views.Forms" version="2.88.8"'; Set-Content $f $c; Write-Host "Patched $f"
          $f="Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj"; $c=(Get-Content $f -Raw) -replace 'SkiaSharp\.Views\.Forms\.1\.60\.3','SkiaSharp.Views.Forms.2.88.8' -replace 'SkiaSharp\.Views\.1\.60\.3','SkiaSharp.Views.2.88.8' -replace 'SkiaSharp\.1\.60\.3','SkiaSharp.2.88.8' -replace 'SkiaSharp, Version=1\.60\.0\.0','SkiaSharp, Version=2.88.0.0' -replace '<Error Condition="[^"]*SkiaSharp[^"]*"[^>]*/>', ''; Set-Content $f $c; Write-Host "Patched $f"
          $f="Saplin.CPDT.UICore\Saplin.CPDT.UICore.csproj"; $c=(Get-Content $f -Raw) -replace '"SkiaSharp\.Views\.Forms" Version="1\.60\.3"','"SkiaSharp.Views.Forms" Version="2.88.8"' -replace '"SkiaSharp\.Views" Version="1\.60\.3"','"SkiaSharp.Views" Version="2.88.8"' -replace '"SkiaSharp" Version="1\.60\.3"','"SkiaSharp" Version="2.88.8"'; Set-Content $f $c; Write-Host "Patched $f"
          Write-Host "SkiaSharp upgraded to 2.88.8"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        shell: pwsh
        run: |
          $slnDir = (Get-Location).Path + "\"
          msbuild Saplin.CPDT.WPF\Saplin.CPDT.WPF.csproj /restore /p:RestorePackagesConfig=true `
            "/p:SolutionDir=$slnDir" /p:Configuration=Release /p:Platform=AnyCPU `
            /p:Prefer32Bit=false /verbosity:minimal

      - name: List build output
        shell: pwsh
        run: Get-ChildItem "Saplin.CPDT.WPF\bin\Release" -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "Saplin.CPDT.WPF\bin\Release\CPDT.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "::error::CPDT.exe not found"
            exit 1
          }
          $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "CPDT.exe — $size MB (loose-DLL build, no Costura)"
          $dlls = (Get-ChildItem "Saplin.CPDT.WPF\bin\Release" -Filter "*.dll").Count
          Write-Host "$dlls DLL files found alongside CPDT.exe"

      - name: Package entire Release folder as ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "Saplin.CPDT.WPF\bin\Release\*" -DestinationPath "CPDT-Windows.zip" -Force
          $size = [math]::Round((Get-Item "CPDT-Windows.zip").Length / 1MB, 1)
          Write-Host "CPDT-Windows.zip created: $size MB"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPDT-Windows
          path: CPDT-Windows.zip
          retention-days: 30
